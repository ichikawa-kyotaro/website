<!DOCTYPE html>
<html>
<head>
    <title>비밀 메세지</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h1>와!</h1>
<p>여기까지 오시다니... 대단하다!</p>
<p>비밀 메세지는 바로</p>
<p id="msg"></p>
<img src="image2.png" width="300">

<script>
const text = "아조씨 사랑해요~~~";
let i = 0;

function typing() {
    if(i < text.length) {
        document.getElementById("msg").innerText += text[i];
        i++;
        setTimeout(typing, 100);
    }
}
typing();
</script>
</body>
</html>
