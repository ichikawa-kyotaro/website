<!DOCTYPE html>
<html>
<head>
    <title>메모</title>
</head>
<body>
<h1>암호를 입력하시오</h1>
<input type="text" id="answer">
<button onclick="checkAnswer()">확인</button>

<p id="hint"></p>

<script>
let tries = 0;

const hints = [
    "힌트1: 한별이가 지금 하고 싶은 말",
    "힌트2: 띄어쓰기 있음",
    "힌트3: 총 다섯 글자",
    "힌트4: 이것도 몰라?",
    "힌트5: ㅇㅇㅇ ㅇㅇ네",
    "힌트6: 허접ㅋ",
    "힌트7: 이제 힌트 없음!",
    "힌트8: 일부러 틀렸구만?! ㅡㅡ",
    "힌트9: 아저씨 ㄱㅇㅇ",
    "정답: 아저씨 바보"
];

function checkAnswer() {
    const answer = document.getElementById("answer").value;

    if(answer === "아저씨 바보") {
        location.href = "ending.html";  // 탈출 성공 페이지
    } else if(answer === "아저씨 귀여워") {
        location.href = "secret.html";  // 다른 특별 페이지
    } else {
        if(tries < hints.length) {
            document.getElementById("hint").innerText = hints[tries];
            tries++;
        } else {
            document.getElementById("hint").innerText = "이걸 보다니!!! 당신은 이스터에그를 찾았습니다!!!\n'아저씨 귀여워'라고 입력해보세요!";
        }
    }
}
</script>
</body>
</html>
